name: Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mac:
    name: Build macOS Desktop App
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Require signing and notarization secrets for release tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required macOS release secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build desktop app
        timeout-minutes: 120
        run: |
          set -euo pipefail

          publish=never
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            publish=always
          fi

          max_attempts=2
          for attempt in $(seq 1 "$max_attempts"); do
            echo "::group::electron-builder attempt ${attempt}/${max_attempts}"
            set +e
            npm --prefix desktop run dist -- --mac dmg zip --universal --publish "$publish"
            status=$?
            set -e
            echo "::endgroup::"

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              exit "$status"
            fi

            echo "Desktop build failed with exit code ${status}; retrying after a short cooldown."
            rm -rf desktop/dist
            sleep 90
          done
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe-research-macos-desktop
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.blockmap
            desktop/dist/latest-mac.yml
